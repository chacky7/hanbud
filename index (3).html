<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanbud Moduļu Metāldakstiņi | Latvija</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,600;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-TWPPL52W');</script>
    <!-- End Google Tag Manager -->
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TWPPL52W"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

    <header class="header">
        <nav class="nav-container container">
            <div class="logo">
                <a href="https://hanbud.lv/" target="_blank" rel="noopener"><span class="logo-text">HANBUD</span></a>
            </div>
            <ul class="nav-links">
                <li><a href="#produkti">Produkti</a></li>
                <li><a href="#prieksrocibas">Priekšrocības</a></li>
                <li><a href="#galerija">Galerija</a></li>
                <li><a href="#formularz" class="btn-primary">Sazināties</a></li>
            </ul>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-slider" id="heroSlider">
                <div class="slide active" style="background-image: linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)), url('https://hanbud.com/wp-content/uploads/2023/04/moderno-roof.jpg');">
                    <div class="container">
                        <h1>Moduļu metāldakstiņi jūsu mājas drošībai</h1>
                        <p>Augstākās kvalitātes jumta segumi tieši no ražotāja Polijā.</p>
                        <button class="btn-hero" onclick="scrollToForm()">Saņemt piedāvājumu</button>
                    </div>
                </div>
            </div>
            <div class="slider-dots">
                <span class="dot active" data-index="0"></span>
                <span class="dot" data-index="1"></span>
                <span class="dot" data-index="2"></span>
            </div>
        </section>

        <section id="formularz" class="section bg-light">
            <div class="container">
                <div class="form-wrapper fade-in">
                    <h2>Pieteikties konsultācijai</h2>
                    <form id="leadForm" onsubmit="handleSubmit(event)">
                        <div class="input-group">
                            <input type="text" name="name" placeholder="Jūsu vārds" required>
                        </div>
                        <div class="input-group">
                            <input type="email" name="email" placeholder="E-pasts" required>
                        </div>
                        <div class="input-group">
                            <input type="tel" name="phone" placeholder="Tālrunis" required>
                        </div>
                        <button type="submit" class="form-submit btn-primary">Nosūtīt pieteikumu</button>
                    </form>
                    <div id="formSuccess" class="success-message" style="display:none;">
                        <h3>Paldies!</h3>
                        <p>Mūsu izplatītājs sazināsies ar jums <strong>48 stundu laikā darba dienās</strong>.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <img id="lbImg" src="" alt="Gallery Image">
        <div id="lbCap"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
